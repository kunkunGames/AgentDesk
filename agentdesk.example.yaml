server:
  port: 8791
  host: "0.0.0.0"

discord:
  bots:
    command:
      token: "YOUR_COMMAND_BOT_TOKEN"
    notify:
      token: "YOUR_NOTIFY_BOT_TOKEN"
  guild_id: "YOUR_GUILD_ID"

agents:
  - id: ch-td
    name: "TD"
    name_ko: "테크니컬 디렉터"
    provider: claude
    channels:
      claude: "td-cc"
      codex: "td-cdx"
    department: engineering

github:
  repos:
    - "owner/repo"

memory:
  backend: auto
  file:
    sak_path: "memories/shared-agent-knowledge/shared_knowledge.md"
    sam_path: "memories/shared-agent-memory"
    ltm_root: "memories/long-term"
    auto_memory_root: "~/.claude/projects/*{workspace}*/memory/"
  mcp:
    endpoint: "http://127.0.0.1:8765"
    access_key_env: "MEMENTO_API_KEY"

policies:
  dir: "./policies"
  hot_reload: true

data:
  dir: "~/.adk"

# Kanban/timeout/review settings are now managed via the dashboard (kv_meta config)
# and seeded with defaults on startup. See CONFIG_KEYS in settings.rs.
