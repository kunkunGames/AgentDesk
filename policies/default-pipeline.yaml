# default-pipeline.yaml — canonical pipeline definition
# This file defines the state machine that kanban.rs enforces.
# Editing this file changes pipeline behavior without rebuilding.
#
# ── State / Stage SSoT relationship (#1081) ─────────────────────
#
# There are two orthogonal concepts in the system; they must not be
# conflated or duplicated:
#
#   * Card states (FSM)  — owned by this YAML file and enforced by the
#                          Rust FSM in `src/engine/transition.rs`. Valid
#                          values and transitions live in the `states:`
#                          and `transitions:` blocks below.
#
#   * Pipeline stages    — owned by the `pipeline_stages` table
#                          (repo/agent level configuration, managed via
#                          `/api/pipeline-stages` and the auto-queue).
#                          Stages are a *scheduling* abstraction layered
#                          on top of the FSM: each stage dispatches work
#                          that drives one or more FSM transitions, but
#                          the FSM itself is the single owner of the
#                          `kanban_cards.status` column.
#
# The one legal bridge between the two is `pipeline_stage_id` on
# `kanban_cards`, assigned by `policies/pipeline.js` when a card enters a
# dispatchable state. All `status` updates must go through the FSM
# (`kanban::transition_status_with_opts` / `_pg` or — for low-level
# callers that already hold a connection — `execute_intent_on_conn`).
# A lint test (`lint_no_direct_kanban_status_update_in_production` in
# `src/kanban.rs`) fails the build if production code issues a direct
# `UPDATE kanban_cards SET status` outside the FSM executor.

name: default
version: 1

# ── States ────────────────────────────────────────────────────────

states:
  - id: backlog
    label: 백로그
  - id: ready
    label: 준비됨
  - id: requested
    label: 요청됨
  - id: in_progress
    label: 진행 중
  - id: review
    label: 리뷰
  - id: done
    label: 완료
    terminal: true

# ── Transitions ───────────────────────────────────────────────────
#
# type:
#   free          — no dispatch required, manual transition
#   gated         — requires all listed gates to pass
#
# Gates are evaluated in order; first failure stops the chain.

transitions:
  # Free transitions (backlog ↔ ready)
  - from: backlog
    to: ready
    type: free

  - from: ready
    to: backlog
    type: free

  # Preflight transition (no dispatch required)
  - from: ready
    to: requested
    type: free

  # Dispatch-gated transitions
  - from: requested
    to: in_progress
    type: gated
    gates: [active_dispatch]

  - from: in_progress
    to: review
    type: gated
    gates: [active_dispatch]

  # review → done requires review pass verdict
  - from: review
    to: done
    type: gated
    gates: [review_passed]

  # review → in_progress requires rework verdict
  - from: review
    to: in_progress
    type: gated
    gates: [review_rework]


# ── Gates ─────────────────────────────────────────────────────────
#
# type:
#   builtin   — evaluated in Rust (kanban.rs / dispatch check)
#   policy    — evaluated by JS policy function

gates:
  active_dispatch:
    type: builtin
    check: has_active_dispatch
    description: Card must have a pending or dispatched dispatch

  review_passed:
    type: builtin
    check: review_verdict_pass
    description: Review verdict must be pass/approved

  review_rework:
    type: builtin
    check: review_verdict_rework
    description: Review verdict must be rework/improve

# ── Hooks ─────────────────────────────────────────────────────────
#
# on_enter: fired when a card enters this state
# on_exit:  fired when a card leaves this state

hooks:
  requested:
    on_enter: [OnCardTransition]
  in_progress:
    on_enter: [OnCardTransition]
  review:
    on_enter: [OnCardTransition, OnReviewEnter]
  done:
    on_enter: [OnCardTransition, OnCardTerminal]

# ── Event Hooks ──────────────────────────────────────────────────
#
# Lifecycle event hooks (not state-transition-bound).
# These fire on specific system events regardless of card state.

events:
  on_dispatch_completed: [OnDispatchCompleted]
  on_review_verdict: [OnReviewVerdict]
  on_session_status_change: [OnSessionStatusChange]

# ── Auto-Queue Phase Gate ───────────────────────────────────────
#
# Repo/agent overrides may replace this block. Resolution order:
# agent override → repo override → these system defaults.

phase_gate:
  dispatch_to: self
  dispatch_type: phase-gate
  pass_verdict: phase_gate_passed
  # #1082: `checks` now references names registered via policies/phase_gate.js.
  # YAML lists the gate names only; their implementations live in the JS
  # registry (`agentdesk.registerPhaseGate(name, fn)`).
  checks:
    - merge_verified
    - issue_closed
    - build_passed

# ── Stage → FSM feedback (#1081) ─────────────────────────────────
#
# Pipeline stages (stored in the `pipeline_stages` table) may declare
# an `on_failure` policy. When a stage's dispatch fails (code failure,
# verdict=reject, timeout exhaust), the pipeline resolver maps that to
# one of the following FSM-visible actions:
#
#   on_failure: fail      — leave card in current state, surface to PMD
#                           via escalation (default).
#   on_failure: rework    — route the card back into a rework loop by
#                           transitioning toward `in_progress` via the
#                           review-rework path. This lets the FSM reuse
#                           its existing `review → in_progress` gated
#                           transition (see `transitions` above) instead
#                           of teaching stages how to mutate status.
#   on_failure: skip      — mark this stage skipped, advance to the next
#                           stage without changing FSM state.
#
# `on_failure_target` (optional) pins the destination stage when the
# default next-stage resolution is insufficient. The FSM state changes
# triggered by these policies still flow exclusively through the FSM
# executor — the stage layer never writes `kanban_cards.status` itself.

stage_failure_policy:
  default: fail
  allowed: [fail, rework, skip]

# ── Clocks ────────────────────────────────────────────────────────
#
# Fields set on state entry for timeout detection.

clocks:
  requested:
    set: requested_at
  in_progress:
    set: started_at
    mode: coalesce  # only set if NULL (preserves original start on rework re-entry)
  review:
    set: review_entered_at
  done:
    set: completed_at

# ── Timeouts ──────────────────────────────────────────────────────
#
# Evaluated by timeouts.js on each onTick cycle.

timeouts:
  # #1082: max_retries >= 1, backoff: exponential (1m→5m→15m),
  # on_exhaust_policy: escalate | notify | fail.  Legacy `on_exhaust` (string
  # state id) remains accepted for backward-compat when `on_exhaust_policy`
  # is not set.

  requested:
    duration: 45m
    clock: requested_at
    max_retries: 10
    backoff: exponential
    on_exhaust: requested           # legacy (state to re-enter)
    on_exhaust_policy: escalate     # #1082 typed policy

  in_progress:
    duration: 2h
    clock: started_at
    max_retries: 1
    backoff: exponential
    on_exhaust: in_progress
    on_exhaust_policy: escalate

  review:
    duration: 30m
    clock: review_entered_at
    max_retries: 1
    backoff: exponential
    on_exhaust: review
    on_exhaust_policy: escalate

  awaiting_dod:
    duration: 15m
    clock: awaiting_dod_at
    condition: review_status = 'awaiting_dod'
    max_retries: 1
    backoff: exponential
    on_exhaust: review
    on_exhaust_policy: escalate
