# qa-pipeline.yaml — QA 단계가 추가된 파이프라인 예제
# review 통과 후 qa_test 단계를 거쳐야 done으로 전환됩니다.
# 커스텀 상태(qa_test)와 커스텀 훅을 보여주는 예제입니다.

name: qa-extended
version: 1

states:
  - id: backlog
    label: 백로그
  - id: ready
    label: 준비됨
  - id: requested
    label: 요청됨
  - id: in_progress
    label: 진행 중
  - id: review
    label: 리뷰
  - id: qa_test
    label: QA 테스트
  - id: pending_decision
    label: 판단 대기
  - id: blocked
    label: 막힘
  - id: done
    label: 완료
    terminal: true

transitions:
  # Free transitions
  - from: backlog
    to: ready
    type: free
  - from: ready
    to: backlog
    type: free

  # Dispatch-gated transitions
  - from: ready
    to: requested
    type: gated
    gates: [active_dispatch]
  - from: requested
    to: in_progress
    type: gated
    gates: [active_dispatch]
  - from: in_progress
    to: review
    type: gated
    gates: [active_dispatch]

  # Review → QA (instead of direct done)
  - from: review
    to: qa_test
    type: gated
    gates: [review_passed]
  - from: review
    to: in_progress
    type: gated
    gates: [review_rework]

  # QA → done (pass) or back to in_progress (fail)
  - from: qa_test
    to: done
    type: gated
    gates: [active_dispatch]
  - from: qa_test
    to: in_progress
    type: force_only

  # Force-only transitions
  - from: requested
    to: pending_decision
    type: force_only
  - from: in_progress
    to: blocked
    type: force_only
  - from: review
    to: pending_decision
    type: force_only
  - from: pending_decision
    to: done
    type: force_only
  - from: pending_decision
    to: requested
    type: force_only
  - from: blocked
    to: requested
    type: force_only

gates:
  active_dispatch:
    type: builtin
    check: has_active_dispatch
    description: Card must have a pending or dispatched dispatch
  review_passed:
    type: builtin
    check: review_verdict_pass
    description: Review verdict must be pass/approved
  review_rework:
    type: builtin
    check: review_verdict_rework
    description: Review verdict must be rework/improve

hooks:
  requested:
    on_enter: [OnCardTransition]
  in_progress:
    on_enter: [OnCardTransition]
  review:
    on_enter: [OnCardTransition, OnReviewEnter]
  qa_test:
    on_enter: [OnCardTransition]
  pending_decision:
    on_enter: [OnCardTransition]
  blocked:
    on_enter: [OnCardTransition]
  done:
    on_enter: [OnCardTransition, OnCardTerminal]

events:
  on_dispatch_completed: [OnDispatchCompleted]
  on_review_verdict: [OnReviewVerdict]

clocks:
  requested:
    set: requested_at
  in_progress:
    set: started_at
    mode: coalesce
  review:
    set: review_entered_at
  done:
    set: completed_at

timeouts:
  requested:
    duration: 45m
    clock: requested_at
    max_retries: 10
    on_exhaust: pending_decision
  in_progress:
    duration: 2h
    clock: started_at
    on_exhaust: blocked
  review:
    duration: 30m
    clock: review_entered_at
    on_exhaust: pending_decision
