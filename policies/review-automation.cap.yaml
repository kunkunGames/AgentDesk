version: 1
policy: review-automation
trust: trusted-automation
source_events:
  - onReviewEnter
  - onDispatchCompleted
  - onReviewVerdict
db:
  read:
    tables:
      - card_review_state
      - kanban_cards
      - kanban_reviews
      - pipeline_stages
      - task_dispatches
  write:
    tables:
      - kanban_cards
  raw_sql:
    mode: legacy
    capabilities:
      - review_lifecycle_legacy_raw_db
    markers_required: false
    rationale: broad legacy review lifecycle DB access pinned by no-silent-growth baseline
    no_silent_growth:
      callsites: 33
      fingerprint: sha256:3a35ba3e9f868c5b4a2f0642e42219247a2e87ba42c70e751ea8d7171fedf186
exec:
  allow:
    - gh
    - git
http:
  loopback_only: true
session:
  kill: false
