version: 1
policy: review-automation
trust: trusted-automation
source_events:
  - onReviewEnter
  - onDispatchCompleted
  - onReviewVerdict
db:
  read:
    tables:
      - card_review_state
      - kanban_cards
      - kanban_reviews
      - pipeline_stages
      - task_dispatches
  write:
    tables:
      - kanban_cards
  raw_sql:
    mode: legacy
    capabilities:
      - review_lifecycle_legacy_raw_db
    markers_required: false
    rationale: broad legacy review lifecycle DB access pinned by no-silent-growth baseline
    no_silent_growth:
      callsites: 31
      fingerprint: sha256:46bff3a7bf02a24c822f678cdd8d9939ce9e9b5e210642452f17c57894d4eedb
exec:
  allow:
    - gh
    - git
http:
  loopback_only: true
session:
  kill: false
