version: 1
policy: merge-automation
trust: trusted-automation
source_events:
  - onCardTerminal
  - onTick5min
include_files:
  - policies/lib/merge-notification-dispatcher.js
db:
  read:
    tables:
      - auto_queue_entries
      - auto_queue_runs
      - issue_specs
      - kanban_cards
      - kv_meta
      - sessions
      - task_dispatches
      - test_phase_runs
  write:
    tables:
      - kanban_cards
      - kv_meta
  raw_sql:
    mode: legacy
    capabilities:
      - merge_automation_legacy_raw_db
    markers_required: false
    rationale: broad legacy merge automation DB access pinned by no-silent-growth baseline
    no_silent_growth:
      callsites: 20
      fingerprint: sha256:26c0318b67918f064dda66b922cf18450ce30175b24313d21c8fdf9a12ad1aa9
exec:
  allow:
    - gh
    - git
    - tmux
http:
  loopback_only: true
session:
  kill: false
