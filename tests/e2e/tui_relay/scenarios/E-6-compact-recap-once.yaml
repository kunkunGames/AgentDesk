id: E-6
title: /compact 후 memory recap이 사용자 메시지로 오인되지 않음 (#2702 + 3.3)
agent_mode: real_live
coverage_class: live
cells: [claude-pipe, claude-tui, claude-e]  # /compact memory recap is claude-only
isolation: required
steps:
  - send_prompt: "응답에 정확히 한 줄로 [E2E:E6:BEFORE] 만 출력해줘."
  - wait_for_discord_text: "[E2E:E6:BEFORE]"
    timeout_s: 240
  - wait_idle_s: 3
  - send_prompt: "/compact"
  - wait_idle_s: 90
  - send_prompt: "응답에 정확히 한 줄로 [E2E:E6:AFTER] 만 출력해줘."
  - wait_for_discord_text: "[E2E:E6:AFTER]"
    timeout_s: 240
assertions:
  - raw_message_count_between_markers:
      min: 2
      max: 50
  - relay_latency_within:
      max_seconds: 300
  - no_duplicate_content: true
  - text_present: "[E2E:E6:AFTER]"
  - raw_text_absent: "Recap:"
