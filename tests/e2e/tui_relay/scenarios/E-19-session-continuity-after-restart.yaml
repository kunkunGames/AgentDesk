id: E-19
title: dcserver restart preserves live tmux session identity
cells: [claude-tui, codex-tui]
isolation: required
destructive: true
acceptance_criteria:
  - Give the live TUI session a secret token before restart without relaying it.
  - Capture the worker tmux session identity before restart.
  - Restart dcserver with the existing destructive guard.
  - Assert the tmux pane ids, pane pids, cwd, and session name are unchanged.
  - Verify a post-restart prompt recalls the secret token and health counters drain.
notes: |
  Concrete #2942/#2943 coverage for #2800/#2854 class regressions. It fails
  if restart recovery kills and recreates the TUI session instead of rebinding
  to the existing tmux pane, and it fails if the post-restart turn loses
  pre-restart conversation context.
steps:
  - send_prompt: |
      E-19 restart continuity setup.
      Remember this secret token for the next turn: E19_SECRET_ALPHA_5AF3C2.
      Do not reveal or repeat the secret token yet.
      Reply with exactly one line only: [E2E:E19:PRE]
  - wait_for_discord_text: "[E2E:E19:PRE]"
    timeout_s: 240
  - capture_session_identity:
      label: before_restart
  - restart_dcserver: {}
  - assert_session_preserved:
      label: before_restart
  - send_prompt: |
      Recall the E-19 secret token I asked you to remember before the restart.
      Reply with exactly one line in this format and no explanation:
      [E2E:E19:POST] <secret-token>
      If you cannot recall it, reply exactly: [E2E:E19:MISSING]
  - wait_for_discord_text: "[E2E:E19:POST] E19_SECRET_ALPHA_5AF3C2"
    timeout_s: 240
  - wait_idle_s: 5
  - assert_health:
      forbid_degraded_reasons:
        - global_active_counter_out_of_bounds
      global_active_max: 0
      global_finalizing_max: 0
assertions:
  - no_duplicate_content: true
  - text_present: "[E2E:E19:PRE]"
  - text_present: "[E2E:E19:POST] E19_SECRET_ALPHA_5AF3C2"
  - marker_absent:
      marker: "[E2E:E19:MISSING]"
      surface: relay
  - no_resume_prompt_chrome: true
