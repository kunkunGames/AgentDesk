id: E-7
title: Codex /compact 직후 새 입력 readiness (#2695)
cells: [codex-pipe, codex-tui]  # Codex /compact readiness is codex-only
isolation: required
steps:
  - send_prompt: "before-compact (E-7)"
  - wait_for_discord_text: "before-compact"
    timeout_s: 240
  - wait_idle_s: 3
  - send_prompt: "/compact"
  - wait_idle_s: 15
  - send_prompt: "after-compact-codex (E-7)"
  - wait_for_discord_text: "after-compact-codex"
    timeout_s: 240
assertions:
  - raw_message_count_between_markers:
      min: 2
      max: 36
  - relay_latency_within:
      max_seconds: 300
  - no_duplicate_content: true
  - text_present: "after-compact-codex"
