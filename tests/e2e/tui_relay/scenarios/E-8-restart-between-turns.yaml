id: E-8
title: 응답 완료 → dcserver dev restart → 새 프롬프트 → 새 응답만 emit
channel: both
isolation: required
destructive: true
steps:
  - send_prompt: "응답에 정확히 한 줄로 [E2E:E8:PRE] 만 출력해줘."
  - wait_for_discord_text: "[E2E:E8:PRE]"
    timeout_s: 240
  - wait_idle_s: 3
  - restart_dcserver:
      target: dev
  - wait_idle_s: 15
  - send_prompt: "응답에 정확히 한 줄로 [E2E:E8:POST] 만 출력해줘."
  - wait_for_discord_text: "[E2E:E8:POST]"
    timeout_s: 240
assertions:
  - no_duplicate_content: true
  - text_present: "[E2E:E8:POST]"
