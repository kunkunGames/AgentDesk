id: E-12
title: 진행 중 tmux kill-pane → "세션 종료" 1회 알림, hang 0 (9.1)
cells: [claude-tui, codex-tui]  # kill-pane assumes a tmux-hosted TUI
isolation: required
destructive: true
notes: |
  pre-flight: list-panes 결과로 pane_id/PID/cwd가 e2e 채널에 묶인 세션과
  일치하는지 재검증 후에만 kill-pane을 수행한다.
steps:
  - send_prompt: |
      응답 첫 줄에 "[E2E:E12:OK]"를 출력하고
      30줄짜리 짧은 시를 작성해줘 (E-12).
  - wait_for_discord_text: "[E2E:E12:OK]"
    timeout_s: 180
  - kill_pane: {}  # driver defaults reverify to adk-{cell}-e2e
  - wait_for_discord_text: "session ended"
    timeout_s: 180
  - wait_idle_s: 5
  - assert_health:
      forbid_degraded_reasons:
        - global_active_counter_out_of_bounds
      global_active_max: 0
      global_finalizing_max: 0
assertions:
  - text_present: "[E2E:E12:OK]"
  - chrome_count:
      text: "session ended"
      exact: 1
  - no_duplicate_content: true
