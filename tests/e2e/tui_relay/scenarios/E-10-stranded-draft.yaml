id: E-10
title: composer에 send-keys (Enter 없이) → restart → 일관된 draft 처리 (#2635)
cells: [claude-tui, codex-tui]  # composer send-keys is TUI-specific
isolation: required
destructive: true
steps:
  - send_prompt: "응답에 정확히 한 줄로 [E2E:E10:WARMUP] 만 출력해줘."
  - wait_for_discord_text: "[E2E:E10:WARMUP]"
    timeout_s: 240
  - wait_idle_s: 3
  - send_keys_no_enter: "stranded-draft-text (E-10)"
  - wait_idle_s: 2
  - restart_dcserver:
      target: dev
  - wait_idle_s: 15
  - send_prompt: "응답에 정확히 한 줄로 [E2E:E10:POST] 만 출력해줘."
  - wait_for_discord_text: "[E2E:E10:POST]"
    timeout_s: 240
  - wait_idle_s: 5
  - assert_health:
      timeout_s: 45
      poll_interval_s: 2
      forbid_degraded_reasons:
        - global_active_counter_out_of_bounds
      global_active_max: 0
      global_finalizing_max: 0
assertions:
  - raw_message_count_between_markers:
      min: 2
      max: 36
  - relay_latency_within:
      max_seconds: 300
  - no_duplicate_content: true
  - text_present: "[E2E:E10:POST]"
  - no_suppressed_label_chrome: true
