id: E-3
title: 멀티라인 + 이모지 / 한글 / 코드블록 입력 echo
cells: [claude-pipe, claude-tui, claude-e, codex-pipe, codex-tui]
isolation: required
steps:
  - send_prompt: |
      응답에 정확히 아래 내용만 출력해줘. 빠뜨리거나 설명을 덧붙이지 마.
      안녕👋 E-3 UTF-8 relay
      ```rust
      fn main() {
          println!("e2e-utf8");
      }
      ```
  - wait_for_discord_text: "e2e-utf8"
    timeout_s: 240
assertions:
  - raw_message_count_between_markers:
      min: 1
      max: 12
  - relay_latency_within:
      max_seconds: 240
  - no_duplicate_content: true
  - text_present: "안녕👋 E-3 UTF-8 relay"
  - text_present: "e2e-utf8"
  - no_control_chars: true
  # #2838 (P0-2): completeness + ordering. The greeting must precede the code
  # block, and the code block body must arrive intact — `text_present`
  # first-hit passes even if the relay truncates between `fn main()` and the
  # println, so assert the head→tail body explicitly.
  - ordered_text_present:
      - "안녕👋 E-3 UTF-8 relay"
      - "fn main()"
      - "e2e-utf8"
  - body_complete:
      head: "fn main()"
      tail: "e2e-utf8"
