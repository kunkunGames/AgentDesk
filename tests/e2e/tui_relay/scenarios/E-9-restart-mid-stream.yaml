id: E-9
title: 스트리밍 중 dev 재기동 — sentinel marker 후 restart, 청크 이어 emit, 중복 0
agent_mode: real_live
coverage_class: live
cells: [claude-pipe, claude-tui, claude-e, codex-pipe, codex-tui]
isolation: required
destructive: true
sentinel:
  marker: "[E2E:E9:STREAM_OK]"
steps:
  - send_prompt: |
      응답 첫 줄에 정확히 "[E2E:E9:STREAM_OK]"를 출력해줘.
      이어서 약 30줄짜리 짧은 시를 작성해줘.
      마지막 줄에는 정확히 "[E2E:E9:END]"를 출력해줘.
  - wait_for_discord_text: "[E2E:E9:STREAM_OK]"
    timeout_s: 180
  - restart_dcserver:
      target: dev
  - wait_for_discord_text: "[E2E:E9:END]"
    timeout_s: 300
  - wait_idle_s: 5
  - assert_health:
      forbid_degraded_reasons:
        - global_active_counter_out_of_bounds
      global_active_max: 0
      global_finalizing_max: 0
assertions:
  - raw_message_count_between_markers:
      min: 1
      max: 36
  - relay_latency_within:
      max_seconds: 300
  - no_duplicate_content: true
  - text_present: "[E2E:E9:STREAM_OK]"
  - text_present: "[E2E:E9:END]"
  - ordered_text_present:
      - "[E2E:E9:STREAM_OK]"
      - "[E2E:E9:END]"
  # #2838 (P0-2): the sentinel was relayed BEFORE the restart. A restart that
  # re-reads the turn from its start offset (root cause #2/#4) re-relays the
  # same answer with a different status header — which no_duplicate_content
  # (byte-identical only) does not catch. The sentinel must appear in exactly
  # one relay message across the whole window, pre- and post-restart.
  - no_duplicate_marker: "[E2E:E9:STREAM_OK]"
