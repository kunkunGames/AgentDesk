id: E-18
title: cancel_turn 중단 후 late marker 미전송 보장
cells: [claude-pipe, claude-tui, codex-pipe, codex-tui]
isolation: required
destructive: true
acceptance_criteria:
  - Use the deterministic provider hold prompt fixture after [E2E:E18:OK].
  - Observe [E2E:E18:OK] in the current turn's durable provider hold state.
  - Execute cancel_turn while the turn is still active.
  - Assert [E2E:E18:LATE] is absent from relay output after cancellation.
  - Assert health counters drain to global_active=0 and global_finalizing=0.
notes: |
  #2937 coverage. This remains destructive-gated and intentionally omits
  claude-e because the stop/cancel path under test is the relay-backed
  pipe/TUI turn lifecycle. The send_provider_hold_prompt fixture asks the
  provider to emit the early marker, block in a shell sleep, and emit the late
  marker only if cancellation fails to stop the turn. The driver waits on the
  durable inflight row, not the Discord relay surface, because TUI relays can
  batch pre-tool and post-tool assistant text into one terminal replacement.
  Since cancel happens as soon as the durable hold witness appears, relay
  surface delivery of the OK marker is intentionally not required.
steps:
  - send_provider_hold_prompt:
      ok_marker: "[E2E:E18:OK]"
      late_marker: "[E2E:E18:LATE]"
      hold_seconds: 60
  - wait_for_provider_hold_state:
      ok_marker: "[E2E:E18:OK]"
      late_marker: "[E2E:E18:LATE]"
      timeout_s: 180
      poll_interval_s: 1
  - cancel_turn:
      force: true
      timeout_s: 15
  - wait_idle_s: 70
  - assert_health:
      timeout_s: 45
      poll_interval_s: 2
      forbid_degraded_reasons:
        - global_active_counter_out_of_bounds
      global_active_max: 0
      global_finalizing_max: 0
assertions:
  - raw_message_count_between_markers:
      min: 0
      max: 36
  - provider_hold_marker_seen: "[E2E:E18:OK]"
  - marker_absent:
      marker: "[E2E:E18:LATE]"
      surface: relay
  - no_duplicate_content: true
  - no_suppressed_label_chrome: true
