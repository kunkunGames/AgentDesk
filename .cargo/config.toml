[build]
# The previous value of `rustc-wrapper = "sccache"` here broke every bare
# `cargo` invocation on machines without sccache installed (Cargo errors with
# `No such file or directory (os error 2)`), forcing agents and developers to
# prefix every command with `RUSTC_WRAPPER=`. A `.sh` wrapper script would
# also break on native Windows Cargo, which does not run the shebang.
#
# We explicitly set `rustc-wrapper = ""` to:
#   1. Disable the wrapper by default, so bare `cargo build`/`cargo check`/
#      `cargo test` works regardless of whether sccache is installed.
#   2. Override any parent-directory `.cargo/config.toml` (e.g. agent
#      worktrees nested under the main repo checkout) that may still have
#      `rustc-wrapper = "sccache"`.
#
# To opt into sccache, callers export `RUSTC_WRAPPER=sccache` via the
# environment (environment beats config). The supported entry points:
#   * CI sets `RUSTC_WRAPPER: sccache` at the workflow `env:` level; the
#     Mozilla sccache action installs the binary.
#   * Release/deploy scripts call `setup_sccache_env` from
#     `scripts/_defaults.sh`, which conditionally exports `RUSTC_WRAPPER`
#     only when sccache is found.
#   * Local developers add `export RUSTC_WRAPPER=sccache` to their shell rc
#     after installing sccache (see README + docs/ci/sccache-setup.md).
rustc-wrapper = ""
# Campaign worktrees are build-once-and-discard; disabling incremental avoids
# multi-GB target/debug/incremental caches in every parallel worktree. sccache
# also requires CARGO_INCREMENTAL=0 to cache rustc invocations.
incremental = false

[target.x86_64-pc-windows-msvc]
linker = "lld-link"
rustflags = ["-C", "target-feature=+crt-static"]
