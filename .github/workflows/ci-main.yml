name: CI Main

on:
  push:
    branches:
      - main

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_CACHE_SIZE: 10G
  SCCACHE_GHA_ENABLED: "true"

jobs:
  changes:
    name: Changed paths
    runs-on: ubuntu-latest
    outputs:
      high_risk_recovery: ${{ steps.filter.outputs.high_risk_recovery }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            high_risk_recovery:
              - '.github/workflows/**'
              - 'policies/auto-queue.js'
              - 'policies/kanban-rules.js'
              - 'policies/timeouts.js'
              - 'policies/timeouts/**'
              - 'policies/lib/**'
              - 'policies/__tests__/**'
              - 'src/db/**'
              - 'src/dispatch/**'
              - 'src/engine/**'
              - 'src/integration_tests.rs'
              - 'src/integration_tests/tests/high_risk_recovery.rs'
              - 'src/kanban/**'
              - 'src/reconcile.rs'
              - 'src/server/routes/auto_queue.rs'
              - 'src/server/routes/dispatched_sessions.rs'
              - 'src/server/routes/dispatches/**'
              - 'src/services/auto_queue.rs'
              - 'src/services/auto_queue/**'
              - 'src/services/discord/**'
              - 'src/services/message_outbox.rs'
              - 'src/services/platform/tmux.rs'
              - 'src/services/tmux_common.rs'

  full_non_pg:
    name: Full tests (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-main-full-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-main-full-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Policy JS unit tests
        run: npm run test:policies

      # Non-PG lane runs the same targeted subset that gates PRs in
      # ci-pr.yml (`changes` job → `cargo test`), with the same non-PG
      # filters applied to every command since this lane has no Postgres
      # service. PR #1306 (#1237) made production routes PG-only, so a
      # `--all-targets` non-PG sweep panics in 169 SQLite-fixture tests
      # that haven't been ported to PG fixtures yet. The PG migration is
      # tracked under #1238; once the bulk of the migration lands, this
      # lane can broaden again.
      - name: cargo test (non-PG, targeted subset)
        run: |
          set -euo pipefail
          cargo test --all-targets transition -- --skip _pg --skip pg_ --skip postgres --test-threads=1
          cargo test --all-targets auto_queue -- --skip _pg --skip pg_ --skip postgres
          cargo test --all-targets cancel -- --skip _pg --skip pg_ --skip postgres
          cargo test --all-targets review_decision -- --skip _pg --skip pg_ --skip postgres
          cargo test invariant --all-targets -- --skip _pg --skip pg_ --skip postgres
        env:
          RUST_BACKTRACE: 1

  postgres:
    name: PostgreSQL tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RUST_BACKTRACE: 1
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      POSTGRES_TEST_DATABASE_URL_BASE: postgresql://postgres:postgres@127.0.0.1:5432
      POSTGRES_TEST_ADMIN_DB: postgres
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-postgres-main-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-postgres-main-

      - name: cargo test (PG routes)
        timeout-minutes: 15
        shell: bash
        run: |
          set -euo pipefail
          cargo test _pg -- --nocapture --test-threads=1
          cargo test pg_ -- --nocapture --test-threads=1
          cargo test postgres -- --nocapture --test-threads=1

  high-risk-recovery:
    name: High-risk recovery
    needs: changes
    if: needs.changes.outputs.high_risk_recovery == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RUST_BACKTRACE: 1
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      POSTGRES_TEST_DATABASE_URL_BASE: postgresql://postgres:postgres@127.0.0.1:5432
      POSTGRES_TEST_ADMIN_DB: postgres
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-recovery-main-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-recovery-main-

      - name: High-risk recovery lane
        run: "cargo test --bin agentdesk high_risk_recovery:: -- --test-threads=1"

  scripts:
    name: Script checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run script checks
        run: ./scripts/ci-script-checks.sh

      - name: Upload maintainability audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maintainability-audit-main
          path: target/maintainability-audit.yaml
          if-no-files-found: ignore
          retention-days: 14
