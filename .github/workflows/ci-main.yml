name: CI Main

on:
  push:
    branches:
      - main

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_CACHE_SIZE: 10G
  SCCACHE_GHA_ENABLED: "true"
  POSTGRES_SERVICE_IMAGE: ${{ vars.AGENTDESK_POSTGRES_SERVICE_IMAGE }}

jobs:
  changes:
    name: Changed paths
    runs-on: ubuntu-latest
    outputs:
      high_risk_recovery: ${{ steps.filter.outputs.high_risk_recovery }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            high_risk_recovery:
              - '.github/workflows/**'
              - 'policies/auto-queue.js'
              - 'policies/kanban-rules.js'
              - 'policies/timeouts.js'
              - 'policies/timeouts/**'
              - 'policies/lib/**'
              - 'policies/__tests__/**'
              - 'src/db/**'
              - 'src/dispatch/**'
              - 'src/engine/**'
              - 'src/high_risk_recovery.rs'
              - 'src/kanban/**'
              - 'src/reconcile.rs'
              - 'src/server/routes/auto_queue.rs'
              - 'src/server/routes/dispatched_sessions.rs'
              - 'src/server/routes/dispatches/**'
              - 'src/services/auto_queue.rs'
              - 'src/services/auto_queue/**'
              - 'src/services/discord/**'
              - '!src/services/discord/placeholder_live_events/**'
              - 'src/services/message_outbox.rs'
              - 'src/services/platform/tmux.rs'
              - 'src/services/tmux_common.rs'

  full_non_pg:
    name: Full tests (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: clippy, rustfmt

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.51.0

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      # Cache only cargo registry/git. `target/` is intentionally NOT cached
      # because sccache (GHA-backed) already caches compiled rustc output and
      # caching multi-GB `target/` directories starves the 10GB GHA cache
      # quota, causing constant LRU eviction of sccache shards (observed:
      # Rust hit-rate collapsed from 99.80% → 0.00% over a few hours of
      # merges). See PR description and docs/ci/sccache-setup.md §4.2.
      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-main-full-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-main-full-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Policy JS unit tests
        run: npm run test:policies

      # `just check` wraps fmt, staged clippy, cargo check, and the same
      # targeted non-PG subset that gates PRs in ci-pr.yml, with the same
      # non-PG filters applied to every cargo test command since this lane has
      # no Postgres service. PR #1306 (#1237) made production routes PG-only, so a
      # `--all-targets` non-PG sweep panics in 169 SQLite-fixture tests
      # that haven't been ported to PG fixtures yet. The PG migration is
      # tracked under #1238; once the bulk of the migration lands, this
      # lane can broaden again.
      - name: just check
        run: just check
        env:
          RUST_BACKTRACE: 1
          # #4245: both main test lanes die with SIGTERM (exit 143) during the
          # `--all-targets` test build/link phase — hosted-runner memory kill.
          # Strip debuginfo from test builds to cut link memory/time; symbol-less
          # backtraces are an accepted CI trade-off.
          CARGO_PROFILE_TEST_DEBUG: "0"
          CARGO_PROFILE_DEV_DEBUG: "0"

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  postgres:
    name: PostgreSQL tests
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      POSTGRES_TEST_DATABASE_URL_BASE: postgresql://postgres:postgres@127.0.0.1:5432
      POSTGRES_TEST_ADMIN_DB: postgres
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL service
        run: ./scripts/ci/postgres-service.sh start

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.51.0

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      # See ci-main.yml `full_non_pg` for rationale: `target/` excluded so the
      # GHA cache quota is not starved out from under sccache.
      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-postgres-main-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-postgres-main-

      - name: just test-postgres
        timeout-minutes: 20
        run: just test-postgres
        env:
          # #4245: see Full tests lane — keep test debuginfo off so the build
          # and serial PostgreSQL suite retain headroom in the bounded step.
          CARGO_PROFILE_TEST_DEBUG: "0"
          CARGO_PROFILE_DEV_DEBUG: "0"

      - name: Stop PostgreSQL service
        if: always()
        run: ./scripts/ci/postgres-service.sh stop

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  high-risk-recovery:
    name: High-risk recovery
    needs: changes
    if: needs.changes.outputs.high_risk_recovery == 'true'
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      POSTGRES_TEST_DATABASE_URL_BASE: postgresql://postgres:postgres@127.0.0.1:5432
      POSTGRES_TEST_ADMIN_DB: postgres
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL service
        run: ./scripts/ci/postgres-service.sh start

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      # See ci-main.yml `full_non_pg` for rationale.
      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-recovery-main-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-recovery-main-

      - name: High-risk recovery lane
        run: "cargo test --bin agentdesk high_risk_recovery:: -- --test-threads=1"

      - name: Stop PostgreSQL service
        if: always()
        run: ./scripts/ci/postgres-service.sh stop

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  scripts:
    name: Script checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python for script checks
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run script checks
        run: ./scripts/ci-script-checks.sh

      - name: Upload maintainability audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maintainability-audit-main
          path: target/maintainability-audit.yaml
          if-no-files-found: ignore
          retention-days: 14
