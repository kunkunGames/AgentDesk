name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  dashboard:
    name: Dashboard (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: dashboard build/test
        run: ./scripts/verify-dashboard.sh

  check:
    name: Fast check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo test (non-PG)
        run: cargo test --all-targets -- --skip _pg_ --skip postgres_
        env:
          RUST_BACKTRACE: 1

      - name: CLI smoke test (help)
        run: cargo run -- --help

      - name: CLI smoke test (doctor — no config)
        run: cargo run -- doctor || true
        env:
          AGENTDESK_ROOT_DIR: ${{ runner.temp }}/adk-smoke

  postgres:
    name: PostgreSQL tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RUST_BACKTRACE: 1
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      POSTGRES_TEST_DATABASE_URL_BASE: postgresql://postgres:postgres@127.0.0.1:5432
      POSTGRES_TEST_ADMIN_DB: postgres
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-postgres-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-postgres-

      - name: cargo test (postgres bootstrap)
        timeout-minutes: 15
        run: cargo test postgres_ -- --nocapture --test-threads=1

      - name: cargo test (PG routes)
        timeout-minutes: 15
        run: cargo test _pg_ -- --nocapture --test-threads=1

  high-risk-recovery:
    name: High-risk recovery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-recovery-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-recovery-

      - name: High-risk recovery lane
        run: "cargo test --bin agentdesk high_risk_recovery::"
        env:
          RUST_BACKTRACE: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: cargo fmt -- --check
        run: cargo fmt -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -W clippy::all

  scripts:
    name: Script checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: shellcheck scripts
        run: |
          FAILED=0
          while IFS= read -r f; do
            shellcheck -S warning "$f" || FAILED=1
          done < <(find . -name '*.sh' -not -path './target/*' -not -path './.git/*')
          exit $FAILED
        shell: bash

      - name: Check hardcoded port/path drift
        run: |
          FAIL=0
          echo "=== Checking for hardcoded ports ==="
          # List port references for visibility (informational — ports are expected in config/defaults)
          grep -rn '8791\|8799' --include='*.rs' --include='*.js' --include='*.yaml' --include='*.json' \
            --exclude-dir=target --exclude-dir=.git \
            | grep -v 'Cargo.lock' \
            | grep -v '// port' \
            | grep -v '# port' || true

          echo ""
          echo "=== Checking for hardcoded home paths (informational — see #100) ==="
          if grep -rn 'env!("HOME")' --include='*.rs' \
            --exclude-dir=target --exclude-dir=.git 2>/dev/null; then
            echo "NOTE: env!(\"HOME\") found — tracked in #100"
          else
            echo "OK: No env!(\"HOME\") found"
          fi
          exit $FAIL

      - name: Path integrity check
        run: |
          FAIL=0
          echo "=== Checking Cargo.toml paths ==="
          # Ensure no absolute paths in Cargo.toml
          if grep -n '/Users/\|/home/' Cargo.toml 2>/dev/null; then
            echo "ERROR: Absolute paths found in Cargo.toml"
            FAIL=1
          fi

          echo "=== Checking policies/ exist ==="
          # Core policy files must be present
          for f in policies/default-pipeline.yaml policies/kanban-rules.js policies/timeouts.js policies/auto-queue.js policies/review-automation.js; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Required policy file missing: $f"
              FAIL=1
            fi
          done

          exit $FAIL

      - name: Generated docs and architecture drift check
        run: python3 scripts/generate_inventory_docs.py --check
