name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows excluded until P1 platform-compat (#98-#101) is complete
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo test
        run: cargo test --all-targets
        env:
          RUST_BACKTRACE: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: cargo fmt -- --check
        run: cargo fmt -- --check
        continue-on-error: true

      - name: cargo clippy
        run: cargo clippy --all-targets -- -W clippy::all

  scripts:
    name: Script checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: shellcheck scripts
        run: |
          find . -name '*.sh' -not -path './target/*' -not -path './.git/*' | while read f; do
            shellcheck -S warning "$f" || true
          done
        continue-on-error: true

      - name: Check hardcoded port/path drift
        run: |
          echo "=== Checking for hardcoded ports ==="
          # Port 8791/8799 should only appear in expected places
          grep -rn '8791\|8799' --include='*.rs' --include='*.js' --include='*.yaml' --include='*.json' \
            --exclude-dir=target --exclude-dir=.git \
            | grep -v 'Cargo.lock' \
            | grep -v '// port' \
            | grep -v '# port' || echo "No unexpected port references found"

          echo ""
          echo "=== Checking for hardcoded home paths ==="
          # env!("HOME") or hardcoded /Users/ paths (except tests)
          grep -rn 'env!("HOME")\|/Users/itismyfield' --include='*.rs' \
            --exclude-dir=target --exclude-dir=.git \
            | grep -v '#\[test\]' \
            | grep -v '// test' || echo "No hardcoded home paths found"
