name: CI PR infrastructure retry

on:
  workflow_run:
    workflows:
      - CI PR
    types:
      - completed

permissions:
  actions: write
  contents: read

concurrency:
  group: ci-pr-infra-retry-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  retry:
    name: Retry infrastructure-only PostgreSQL failure
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      # workflow_run has a write-capable token. Always execute the classifier
      # from the trusted default branch, never from the pull request head.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Classify failure and rerun PostgreSQL job
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: ./scripts/ci/infra-failure-rerun.sh
