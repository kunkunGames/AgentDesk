name: CI PR

on:
  # PR-only triggers. The previous `push: branches-ignore: [main]` trigger ran
  # this whole workflow a SECOND time for every push that also had an open PR
  # (pull_request: synchronize already covers PR-branch pushes), doubling CI
  # compute. Deduping via the concurrency group instead would cancel the older
  # run, but the `*_required_context` mirrors run `if: always()` and FAIL CLOSED
  # on a `cancelled` upstream — so cancellation surfaces spurious required-check
  # failures. Dropping the redundant push trigger removes the duplicate at the
  # source with no cancellation. Branch CI is obtained by opening a PR; main is
  # covered by ci-main.yml.
  pull_request:
  workflow_dispatch:

concurrency:
  # A PR number is unique inside the base repository, unlike `head_ref`: two
  # forks can use the same source branch name and must never cancel each other.
  # Manual dispatch has no PR payload, so isolate it by the selected ref.
  group: ci-pr-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  # A newer push makes every result from the older SHA stale, so release its
  # hosted runners immediately. The `*_required_context` mirrors remain
  # fail-closed: cancellation may leave failed/cancelled contexts on the OLD
  # SHA, while branch protection still requires fresh green contexts on the
  # newest exact HEAD SHA. Manual cancellation of the newest run therefore
  # remains blocking until that exact SHA is rerun successfully.
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_CACHE_SIZE: 10G
  SCCACHE_GHA_ENABLED: "true"
  POSTGRES_SERVICE_IMAGE: ${{ vars.AGENTDESK_POSTGRES_SERVICE_IMAGE }}

jobs:
  changes:
    name: Changed paths
    runs-on: ubuntu-latest
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      high_risk_recovery: ${{ steps.filter.outputs.high_risk_recovery }}
      pg_db: ${{ steps.filter.outputs.pg_db }}
      rust_or_policy: ${{ steps.filter.outputs.rust_or_policy }}
      rust_compile: ${{ steps.filter.outputs.rust_compile }}
      # True when a relay-state-contract anchor file, the contract doc, or the
      # sync gate itself changed. Used to run the compile-existence half
      # (`check_fast`, which compiles the `relay_state_contract_refs` blocks)
      # even for doc-only contract changes (#4268).
      relay_contract: ${{ steps.filter.outputs.relay_contract }}
      # True when a Rust-compile change touches paths OUTSIDE the relay
      # stabilization surface, i.e. it actually needs cross-OS verification.
      # Relay-only PRs (src/services/discord/**, tests/e2e/**) leave this
      # false so the ~22min PR-time Windows lane is skipped; the nightly
      # workflow still exercises the full macOS/Windows matrix within 24h.
      # NOTE: this gates ONLY the advisory Windows lane. Required ubuntu
      # Rust/PG/dashboard mirrors still verify every matching PR.
      cross_os_rust: ${{ steps.cross_os_filter.outputs.cross_os_rust }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dashboard:
              - 'dashboard/**'
              - 'scripts/verify-dashboard.sh'
            high_risk_recovery:
              - '.github/workflows/**'
              - 'policies/auto-queue.js'
              - 'policies/kanban-rules.js'
              - 'policies/timeouts.js'
              - 'policies/timeouts/**'
              - 'policies/lib/**'
              - 'policies/__tests__/**'
              - 'src/db/**'
              - 'src/dispatch/**'
              - 'src/engine/**'
              - 'src/high_risk_recovery.rs'
              - 'src/kanban/**'
              - 'src/reconcile.rs'
              - 'src/server/routes/auto_queue.rs'
              - 'src/server/routes/dispatched_sessions.rs'
              - 'src/server/routes/dispatches/**'
              - 'src/server/routes/message_outbox.rs'
              - 'src/server/routes/scheduled_messages.rs'
              - 'src/server/worker_registry.rs'
              - 'src/services/auto_queue.rs'
              - 'src/services/auto_queue/**'
              - 'src/services/scheduled_messages.rs'
              - 'src/services/scheduled_messages/**'
              - 'src/services/discord/outbound/source_registry.rs'
              - 'src/services/discord/**'
              - '!src/services/discord/placeholder_live_events/**'
              - 'src/services/message_outbox.rs'
              - 'src/services/message_outbox_recovery.rs'
              - 'src/services/message_outbox_recovery_support.rs'
              - 'src/services/message_outbox_recovery_tests.rs'
              - 'src/services/platform/tmux.rs'
              - 'src/services/tmux_common.rs'
            pg_db:
              - '.github/workflows/**'
              - 'justfile'
              - 'migrations/**'
              - 'scripts/ci/postgres-service.sh'
              - 'src/db/**'
              - 'src/dispatch/**'
              - 'src/engine/**'
              - 'src/high_risk_recovery.rs'
              - 'src/kanban/**'
              - 'src/reconcile.rs'
              - 'src/server/routes/auto_queue.rs'
              - 'src/server/routes/dispatched_sessions.rs'
              - 'src/server/routes/dispatches/**'
              - 'src/server/routes/message_outbox.rs'
              - 'src/server/routes/scheduled_messages.rs'
              - 'src/server/worker_registry.rs'
              - 'src/services/auto_queue.rs'
              - 'src/services/auto_queue/**'
              - 'src/services/dispatches/**'
              - 'src/services/scheduled_messages.rs'
              - 'src/services/scheduled_messages/**'
              - 'src/services/discord/outbound/source_registry.rs'
              # #4460: recovery owns production-shaped PostgreSQL/outbox
              # tests; changes to the owner or its sidecars must run them.
              - 'src/services/discord/health/recovery.rs'
              - 'src/services/discord/health/recovery/**'
              - 'src/services/message_outbox.rs'
              - 'src/services/message_outbox_recovery.rs'
              - 'src/services/message_outbox_recovery_support.rs'
              - 'src/services/message_outbox_recovery_tests.rs'
              - 'src/services/api_friction/**'
              - 'src/services/retrospectives.rs'
              - 'src/services/discord_dm_reply_store.rs'
              - 'src/server/cluster.rs'
              - 'src/server/task_dispatch_claims.rs'
              - 'src/services/dispatch_watchdog.rs'
              - 'src/services/cluster/intake_router_hook.rs'
              - 'src/services/cluster/intake_router_hook/**'
              - 'src/services/discord/router/intake_dispatch.rs'
              - 'src/services/discord/router/intake_dispatch/**'
              - 'src/services/observability/**'
              - 'src/config.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'sqlx-data.json'
            rust_or_policy:
              - 'src/**'
              - 'tests/**'
              - 'migrations/**'
              - 'justfile'
              - 'policies/**'
              - 'scripts/**'
              - '.github/workflows/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'package.json'
              - 'package-lock.json'
              - '.cargo/**'
              - 'rust-toolchain*'
              - 'build.rs'
              # defaults.json is embedded into the Rust binary via
              # `include_str!("../defaults.json")` in src/config.rs.
              - 'defaults.json'
              # routines/** is enumerated and executed by the
              # `bundled_sample_routines_load_and_validate` Rust test
              # (src/services/routines/loader.rs); adding/removing/renaming
              # a routine script can break the asserted file list.
              - 'routines/**'
            # relay_contract: the doc<->code binding surface for the #4268
            # contract symbol-ref gate. When any of these change, the
            # compile-existence half (check_fast, which compiles the
            # `relay_state_contract_refs` blocks so a renamed/removed contract
            # symbol fails to compile) MUST run even for doc-only changes.
            # Keep this list in sync with REFERENCE_SOURCE_MODULES in
            # scripts/check_contract_symbol_refs.py.
            relay_contract:
              - 'docs/relay-state-contract.md'
              - 'scripts/check_contract_symbol_refs.py'
              - 'tests/test_contract_symbol_refs.py'
              - 'src/services/discord/inflight/store.rs'
              - 'src/services/discord/turn_bridge/terminal_delivery.rs'
              - 'src/services/discord/tmux_watcher/liveness.rs'
              - 'src/services/discord/router/message_handler/watchdog.rs'
            # rust_compile is a narrower subset of rust_or_policy: only paths
            # whose change can plausibly alter Rust binary output (and therefore
            # require cross-OS verification on macOS/Windows). Pure JS policy,
            # shell script, most CI metadata, and Node package changes are
            # excluded — those are still verified by the ubuntu Rust lane plus
            # Lint/Script checks, and the nightly workflow continues to run
            # the full macOS/Windows matrix daily. ci-pr.yml itself is included
            # so edits to this Rust CI lane exercise its own Windows job.
            #
            # Must include every compile-time Rust input. Audit before adding
            # new `include_str!`/`include_bytes!`/`sqlx::migrate!`/`build.rs`
            # tracked paths.
            rust_compile:
              - 'src/**'
              - 'tests/**'
              - 'migrations/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'sqlx-data.json'
              - '.cargo/**'
              - 'rust-toolchain*'
              - 'build.rs'
              - '.github/workflows/ci-pr.yml'
              # defaults.json is embedded into the Rust binary via
              # `include_str!("../defaults.json")` in src/config.rs.
              - 'defaults.json'
              # routines/** is enumerated and executed by the
              # `bundled_sample_routines_load_and_validate` Rust test
              # (src/services/routines/loader.rs); a routine asset change
              # can fail the test on any OS.
              - 'routines/**'

      # This filter needs `every`: with dorny/paths-filter's default `some`, a
      # broad positive rule can make a file match despite a negative rule.
      # Keep the brace alternatives in sync with `rust_compile` above.
      - name: Detect cross-OS Rust changes
        id: cross_os_filter
        uses: dorny/paths-filter@v3
        with:
          predicate-quantifier: every
          filters: |
            cross_os_rust:
              - '{src/**,tests/**,migrations/**,Cargo.toml,Cargo.lock,sqlx-data.json,.cargo/**,rust-toolchain*,build.rs,.github/workflows/ci-pr.yml,defaults.json,routines/**}'
              - '!src/services/discord/**'
              - '!tests/e2e/**'

  dashboard:
    name: Dashboard (Node 22)
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: dashboard build/test
        run: ./scripts/verify-dashboard.sh

  # Ubuntu Rust lane: canonical fast check. Gated on the broad rust_or_policy
  # filter so a `policies/*.js`, `scripts/*.sh`, `.github/workflows/**`, or
  # Node package change still gets a Rust check on Linux.
  #
  # The `relay_contract == 'true'` OR-clause forces this lane for a #4268
  # contract anchor, doc, or sync-gate change, including doc-only changes. This
  # job compiles the `relay_state_contract_refs` blocks, which is the only proof
  # that each contract symbol still exists.
  check_fast:
    name: Fast check + non-PG tests (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust_or_policy == 'true' || needs.changes.outputs.relay_contract == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: clippy, rustfmt

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.51.0

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      # `target/` is intentionally NOT cached — sccache (GHA-backed) handles
      # compiled rustc output, and caching multi-GB `target/` directories
      # starves the 10GB GHA cache quota, evicting sccache shards (observed
      # Rust hit-rate collapse: 99.80% → 0.00% within hours of merges). See
      # docs/ci/sccache-setup.md §4.2.
      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Policy JS unit tests
        run: npm run test:policies

      - name: just check
        run: just check
        env:
          # Cold `cargo test --all-targets` on the 16GB ubuntu runner peaks over
          # RAM during codegen+link (SIGTERM/143). Two step-scoped levers keep
          # peak RSS under the ceiling; test semantics are unchanged (neither
          # affects which tests run or their results). Step-scoped so no other
          # Rust job's resource envelope is touched.
          #   1. Cap parallel compile jobs at 2 (default = 4 vCPU) to bound
          #      concurrent rustc/link.
          CARGO_BUILD_JOBS: "2"
          #   2. Drop debuginfo for the dev/test profiles. Linking many
          #      `--all-targets` test binaries with full debuginfo is the
          #      dominant peak-memory source; `-j2` alone still OOM'd on the
          #      link phase, so strip it here. CI test failures still report
          #      panics/asserts; only source-line debug data is omitted.
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"

      - name: sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats || true

  # Cross-OS Rust compile lanes: macOS + Windows. Gated on the narrower
  # rust_compile filter so docs-only, dashboard-only, JS-policy-only,
  # script-only, workflow-metadata-only, and Node-package-only PRs skip the
  # ~25 min macOS lane and the ~30 min Windows lane entirely. Nightly still
  # exercises the full matrix daily, so cross-OS Rust drift cannot land
  # silently.
  check_fast_cross_os:
    name: Fast check + non-PG tests (${{ matrix.os }})
    needs: changes
    # Advisory (non-required) cross-OS lane. Run only when a Rust-compile
    # change reaches OUTSIDE the relay stabilization surface (cross_os_rust);
    # relay-only PRs (src/services/discord/**, tests/e2e/**) skip it and rely
    # on the nightly full macOS/Windows matrix.
    if: needs.changes.outputs.rust_compile == 'true' && needs.changes.outputs.cross_os_rust == 'true'
    runs-on: ${{ matrix.os }}
    env:
      # Cross-OS failures need compiler/test diagnostics, not native debug
      # symbols. Windows spends most of this lane compiling and linking test
      # harnesses; stripping debuginfo preserves every target and test while
      # reducing the critical path and peak linker memory.
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    strategy:
      fail-fast: false
      matrix:
        # macOS PR lane temporarily disabled to unblock issue throughput
        # (2026-05-17). Agents run on macOS locally and verify
        # `cargo build --bin agentdesk` before pushing, so PR-time macOS
        # coverage is largely redundant. Nightly (`ci-nightly.yml`) still
        # exercises macOS daily so cross-OS Rust drift cannot land
        # silently for more than 24h. Restore by adding `macos-latest`
        # back to this matrix once issue backlog stabilises.
        os: [windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Disable sccache on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          {
            echo "RUSTC_WRAPPER="
            echo "SCCACHE_GHA_ENABLED="
          } >> "$GITHUB_ENV"

      - name: Install Opus on macOS
        if: runner.os == 'macOS'
        run: |
          brew install opus pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix opus)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      - name: Setup sccache
        if: runner.os != 'macOS'
        uses: mozilla-actions/sccache-action@v0.0.9

      # `target/` is intentionally NOT cached — sccache (GHA-backed) handles
      # compiled rustc output, and caching multi-GB `target/` directories
      # starves the 10GB GHA cache quota, evicting sccache shards (observed
      # Rust hit-rate collapse: 99.80% → 0.00% within hours of merges). See
      # docs/ci/sccache-setup.md §4.2.
      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Stage 1 keeps Windows inline and default-feature-only instead of
      # `just check`: this lane's job is cross-OS compile and targeted test
      # signal, while fmt/staged clippy and full workspace checks are
      # authoritative in the Ubuntu jobs above.
      - name: cargo check
        shell: bash
        env:
          BASH_ENV: /dev/null
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo check --workspace --all-targets

      # #4466: compile-only coverage cannot prove Win32 named-mutex ownership
      # or cross-process blocking. This non-advisory step runs the real child
      # process proof on the Windows runner.
      - name: Discord thread-create cross-process lock
        shell: bash
        env:
          BASH_ENV: /dev/null
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo test --lib discord_thread_create -- --test-threads=1

      - name: cargo test (non-PG, targeted subset)
        # Windows is an advisory anti-rot lane for this Unix-only project; its
        # known test/runner flakes must not paint the PR red. See #4202/#4423.
        continue-on-error: true
        shell: bash
        env:
          BASH_ENV: /dev/null
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: |
          set -euo pipefail
          cargo test --all-targets transition -- --skip _pg --skip pg_ --skip postgres --test-threads=1
          cargo test --all-targets auto_queue -- --skip _pg --skip pg_ --skip postgres
          cargo test --all-targets cancel -- --skip _pg --skip pg_ --skip postgres
          cargo test --all-targets review_decision -- --skip _pg --skip pg_ --skip postgres
          cargo test --all-targets stall_recovery -- --skip _pg --skip pg_ --skip postgres
          env -u AGENTDESK_ROOT_DIR cargo test --lib relay_recovery -- --skip _pg --skip pg_ --skip postgres
          python3 scripts/ci-timeout.py 900 env -u AGENTDESK_ROOT_DIR cargo test --lib health -- --skip _pg --skip pg_ --skip postgres
          cargo test --all-targets routines -- --skip _pg --skip pg_ --skip postgres
          cargo test invariant --all-targets -- --skip _pg --skip pg_ --skip postgres

      - name: sccache stats
        if: always() && runner.os != 'macOS'
        shell: bash
        run: sccache --show-stats || true

  fast_check_required_context:
    name: Fast check (ubuntu-latest)
    needs:
      - changes
      - check_fast
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mirror fast check result for branch protection
        if: ${{ needs.changes.outputs.relay_contract != 'true' }}
        env:
          CHANGED_PATHS_RESULT: ${{ needs.changes.result }}
          FILTER_NAME: rust_or_policy
          FILTER_OUTPUT: ${{ needs.changes.outputs.rust_or_policy }}
          UPSTREAM_JOB_NAME: check_fast
          UPSTREAM_RESULT: ${{ needs.check_fast.result }}
        run: ./scripts/required-check-mirror.sh

      # Contract changes use their own filter identity so a doc-only contract
      # edit cannot make the required mirror treat the forced compile as an
      # expected skip (#4268).
      - name: Relay-contract fast check mirror (always, #4268)
        if: ${{ needs.changes.outputs.relay_contract == 'true' }}
        env:
          CHANGED_PATHS_RESULT: ${{ needs.changes.result }}
          FILTER_NAME: relay_contract
          FILTER_OUTPUT: ${{ needs.changes.outputs.relay_contract }}
          UPSTREAM_JOB_NAME: check_fast
          UPSTREAM_RESULT: ${{ needs.check_fast.result }}
        run: ./scripts/required-check-mirror.sh

  fast_targeted_tests_required_context:
    name: Fast targeted tests (ubuntu-latest)
    needs:
      - changes
      - test_fast
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mirror targeted test result for branch protection
        env:
          CHANGED_PATHS_RESULT: ${{ needs.changes.result }}
          FILTER_NAME: pg_db
          FILTER_OUTPUT: ${{ needs.changes.outputs.pg_db }}
          UPSTREAM_JOB_NAME: test_fast
          UPSTREAM_RESULT: ${{ needs.test_fast.result }}
        run: ./scripts/required-check-mirror.sh

  dashboard_required_context:
    name: Dashboard required context (ubuntu-latest)
    needs:
      - changes
      - dashboard
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mirror dashboard result for branch protection
        env:
          CHANGED_PATHS_RESULT: ${{ needs.changes.result }}
          FILTER_NAME: dashboard
          FILTER_OUTPUT: ${{ needs.changes.outputs.dashboard }}
          UPSTREAM_JOB_NAME: dashboard
          UPSTREAM_RESULT: ${{ needs.dashboard.result }}
        run: ./scripts/required-check-mirror.sh

  test_fast:
    name: PostgreSQL tests (ubuntu-postgres)
    needs: changes
    if: needs.changes.outputs.pg_db == 'true'
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      POSTGRES_TEST_DATABASE_URL_BASE: postgresql://postgres:postgres@127.0.0.1:5432
      POSTGRES_TEST_ADMIN_DB: postgres
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      # Preserve the full serial PostgreSQL suite while reducing cold-link
      # time and memory exposure on hosted runners. Assertions and panic text
      # remain available; only native debug symbols are omitted.
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL service
        run: ./scripts/ci/postgres-service.sh start

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.51.0

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      # See `check_fast` for rationale: `target/` excluded to protect sccache
      # GHA cache quota.
      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-fast-tests-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fast-tests-

      - name: just test-postgres
        timeout-minutes: 20
        shell: bash
        env:
          BASH_ENV: /dev/null
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: just test-postgres

      - name: Stop PostgreSQL service
        if: always()
        run: ./scripts/ci/postgres-service.sh stop

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  high-risk-recovery:
    name: High-risk recovery
    needs: changes
    if: needs.changes.outputs.high_risk_recovery == 'true'
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      POSTGRES_TEST_DATABASE_URL_BASE: postgresql://postgres:postgres@127.0.0.1:5432
      POSTGRES_TEST_ADMIN_DB: postgres
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL service
        run: ./scripts/ci/postgres-service.sh start

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      # See `check_fast` for rationale.
      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-recovery-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-recovery-

      - name: High-risk recovery lane
        run: "cargo test --bin agentdesk high_risk_recovery:: -- --test-threads=1"

      - name: Stop PostgreSQL service
        if: always()
        run: ./scripts/ci/postgres-service.sh stop

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  high_risk_recovery_required_context:
    name: High-risk recovery required context (ubuntu-latest)
    needs:
      - changes
      - high-risk-recovery
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mirror high-risk recovery result for branch protection
        env:
          CHANGED_PATHS_RESULT: ${{ needs.changes.result }}
          FILTER_NAME: high_risk_recovery
          FILTER_OUTPUT: ${{ needs.changes.outputs.high_risk_recovery }}
          UPSTREAM_JOB_NAME: high-risk-recovery
          UPSTREAM_RESULT: ${{ needs.high-risk-recovery.result }}
        run: ./scripts/required-check-mirror.sh

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.rust_or_policy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: clippy, rustfmt

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.51.0

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      # See `check_fast` for rationale.
      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: just fmt-check
        run: just fmt-check

      - name: just lint
        run: just lint

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  lint_required_context:
    name: Lint required context (ubuntu-latest)
    needs:
      - changes
      - lint
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mirror lint result for branch protection
        env:
          CHANGED_PATHS_RESULT: ${{ needs.changes.result }}
          FILTER_NAME: rust_or_policy
          FILTER_OUTPUT: ${{ needs.changes.outputs.rust_or_policy }}
          UPSTREAM_JOB_NAME: lint
          UPSTREAM_RESULT: ${{ needs.lint.result }}
        run: ./scripts/required-check-mirror.sh

  check_fast_cross_os_required_context:
    name: Fast check cross OS required context (ubuntu-latest)
    needs:
      - changes
      - check_fast_cross_os
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mirror check_fast_cross_os result for branch protection
        env:
          CHANGED_PATHS_RESULT: ${{ needs.changes.result }}
          # Mirror on `cross_os_rust`, NOT `rust_compile`: the cross-OS lane is
          # now gated on cross_os_rust, so a relay-only PR (rust_compile=true,
          # cross_os_rust=false) legitimately SKIPS the Windows job. Keying the
          # mirror on rust_compile would fail closed on that expected skip;
          # cross_os_rust=false lets required-check-mirror.sh treat the skip as
          # pass, while cross_os_rust=true still requires the lane to succeed.
          FILTER_NAME: cross_os_rust
          FILTER_OUTPUT: ${{ needs.changes.outputs.cross_os_rust }}
          UPSTREAM_JOB_NAME: check_fast_cross_os
          UPSTREAM_RESULT: ${{ needs.check_fast_cross_os.result }}
        run: ./scripts/required-check-mirror.sh

  scripts:
    name: Script checks
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python for script checks
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Large file guard
        shell: bash
        run: |
          set -euo pipefail
          limit=$((10 * 1024 * 1024))
          failed=0
          while IFS= read -r path; do
            [ -f "$path" ] || continue
            size=$(git cat-file -s "HEAD:$path")
            if [ "$size" -gt "$limit" ]; then
              printf 'ERROR: tracked file exceeds 10 MiB: %s (%s bytes)\n' "$path" "$size"
              failed=1
            fi
          done < <(git ls-files)
          exit "$failed"

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run script checks
        run: ./scripts/ci-script-checks.sh

      # Keep high-value relay ratchets as explicit named steps as well as in the
      # aggregate script suite so their failure surface is immediately visible.
      - name: Hotfile LOC ratchet (always, #3565)
        run: python3 scripts/check_hotfile_ratchet.py

      - name: Inflight blind-save ratchet (always, #4259)
        run: python3 scripts/check_inflight_blind_save_ratchet.py

      # Contract symbol-ref doc<->code sync checks verify that the contract's
      # `sym:` anchors exactly match the references parsed from the
      # `relay_state_contract_refs` blocks that `cargo check --all-targets`
      # compiles to prove those symbols exist. The `relay_contract` path filter
      # force-runs that compile for doc-only changes, so both halves stay on.
      - name: Contract symbol-ref sync gate (always, #4268)
        run: |
          python3 scripts/check_contract_symbol_refs.py
          python3 -m unittest tests.test_contract_symbol_refs

      - name: Upload maintainability audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maintainability-audit
          path: target/maintainability-audit.yaml
          if-no-files-found: ignore
          retention-days: 14
