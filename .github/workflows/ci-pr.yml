name: CI PR

on:
  push:
    branches-ignore:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-pr-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_CACHE_SIZE: 10G
  SCCACHE_GHA_ENABLED: "true"

jobs:
  changes:
    name: Changed paths
    runs-on: ubuntu-latest
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      high_risk_recovery: ${{ steps.filter.outputs.high_risk_recovery }}
      pg_db: ${{ steps.filter.outputs.pg_db }}
      rust_or_policy: ${{ steps.filter.outputs.rust_or_policy }}
      rust_compile: ${{ steps.filter.outputs.rust_compile }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dashboard:
              - 'dashboard/**'
              - 'scripts/verify-dashboard.sh'
            high_risk_recovery:
              - '.github/workflows/**'
              - 'policies/auto-queue.js'
              - 'policies/kanban-rules.js'
              - 'policies/timeouts.js'
              - 'policies/timeouts/**'
              - 'policies/lib/**'
              - 'policies/__tests__/**'
              - 'src/db/**'
              - 'src/dispatch/**'
              - 'src/engine/**'
              - 'src/integration_tests.rs'
              - 'src/integration_tests/tests/high_risk_recovery.rs'
              - 'src/kanban/**'
              - 'src/reconcile.rs'
              - 'src/server/routes/auto_queue.rs'
              - 'src/server/routes/dispatched_sessions.rs'
              - 'src/server/routes/dispatches/**'
              - 'src/services/auto_queue.rs'
              - 'src/services/auto_queue/**'
              - 'src/services/discord/**'
              - '!src/services/discord/placeholder_live_events/**'
              - 'src/services/message_outbox.rs'
              - 'src/services/platform/tmux.rs'
              - 'src/services/tmux_common.rs'
            pg_db:
              - '.github/workflows/**'
              - 'migrations/**'
              - 'src/db/**'
              - 'src/dispatch/**'
              - 'src/engine/**'
              - 'src/integration_tests.rs'
              - 'src/integration_tests/**'
              - 'src/kanban/**'
              - 'src/reconcile.rs'
              - 'src/server/routes/auto_queue.rs'
              - 'src/server/routes/dispatched_sessions.rs'
              - 'src/server/routes/dispatches/**'
              - 'src/services/auto_queue.rs'
              - 'src/services/auto_queue/**'
              - 'src/services/dispatches/**'
              - 'src/services/message_outbox.rs'
              - 'src/services/api_friction/**'
              - 'src/services/retrospectives.rs'
              - 'src/services/discord_dm_reply_store.rs'
              - 'src/server/cluster.rs'
              - 'src/server/task_dispatch_claims.rs'
              - 'src/services/dispatch_watchdog.rs'
              - 'src/services/observability/**'
              - 'src/config.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'sqlx-data.json'
            rust_or_policy:
              - 'src/**'
              - 'tests/**'
              - 'migrations/**'
              - 'policies/**'
              - 'scripts/**'
              - '.github/workflows/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'package.json'
              - 'package-lock.json'
              - '.cargo/**'
              - 'rust-toolchain*'
              - 'build.rs'
              # defaults.json is embedded into the Rust binary via
              # `include_str!("../defaults.json")` in src/config.rs.
              - 'defaults.json'
              # routines/** is enumerated and executed by the
              # `bundled_sample_routines_load_and_validate` Rust test
              # (src/services/routines/loader.rs); adding/removing/renaming
              # a routine script can break the asserted file list.
              - 'routines/**'
            # rust_compile is a narrower subset of rust_or_policy: only paths
            # whose change can plausibly alter Rust binary output (and therefore
            # require cross-OS verification on macOS/Windows). Pure JS policy,
            # shell script, CI metadata, and Node package changes are excluded —
            # those are still verified by the ubuntu Rust lane plus Lint/Script
            # checks, and the nightly workflow continues to run the full
            # macOS/Windows matrix daily.
            #
            # Must include every compile-time Rust input. Audit before adding
            # new `include_str!`/`include_bytes!`/`sqlx::migrate!`/`build.rs`
            # tracked paths.
            rust_compile:
              - 'src/**'
              - 'tests/**'
              - 'migrations/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'sqlx-data.json'
              - '.cargo/**'
              - 'rust-toolchain*'
              - 'build.rs'
              # defaults.json is embedded into the Rust binary via
              # `include_str!("../defaults.json")` in src/config.rs.
              - 'defaults.json'
              # routines/** is enumerated and executed by the
              # `bundled_sample_routines_load_and_validate` Rust test
              # (src/services/routines/loader.rs); a routine asset change
              # can fail the test on any OS.
              - 'routines/**'

  dashboard:
    name: Dashboard (Node 22)
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: dashboard build/test
        run: ./scripts/verify-dashboard.sh

  # Ubuntu Rust lane: canonical fast check. Gated on the broad rust_or_policy
  # filter so a `policies/*.js`, `scripts/*.sh`, `.github/workflows/**`, or
  # Node package change still gets a Rust check on Linux.
  check_fast:
    name: Fast check + non-PG tests (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust_or_policy == 'true'
    # Opt-in self-hosted macOS runner.
    #
    # When repo variable MACOS_RUNNER is set to a JSON array of labels
    # (e.g. '["self-hosted","macOS","arm64","agentdesk-mac-mini"]'),
    # the macos-latest matrix entry routes to that runner — but ONLY
    # for trusted triggers (`push` and `workflow_dispatch`). Any
    # `pull_request` event (including those opened from forks) is
    # forced to the GitHub-hosted `macos-latest` runner regardless of
    # `vars.MACOS_RUNNER`. Default (variable unset) is macos-latest.
    #
    # Why event-gate instead of fork-gate?
    # A `pull_request` workflow file is supplied by the PR head — i.e.
    # a malicious fork can rewrite this expression or the sanity check
    # below in its own workflow run. Workflow-local fork checks are
    # therefore not a real isolation boundary. The robust approach is
    # to keep all `pull_request` jobs on GitHub-hosted runners and
    # only allow self-hosted on triggers that fork contributors cannot
    # initiate:
    #   - `push`: pushes to branches in this repo (forks cannot push
    #     here without write access)
    #   - `workflow_dispatch`: requires repo write permission
    # See docs/ci-self-hosted-runner.md §6.
    runs-on: ${{ fromJSON((matrix.os == 'macos-latest' && vars.MACOS_RUNNER != '' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')) && vars.MACOS_RUNNER || format('"{0}"', matrix.os)) }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Policy JS unit tests
        run: npm run test:policies

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo test (non-PG, targeted subset)
        shell: bash
        run: |
          set -euo pipefail
          cargo test --all-targets transition -- --skip _pg --skip pg_ --skip postgres --test-threads=1
          cargo test --all-targets auto_queue -- --skip _pg --skip pg_ --skip postgres
          cargo test --all-targets cancel -- --skip _pg --skip pg_ --skip postgres
          cargo test --all-targets review_decision -- --skip _pg --skip pg_ --skip postgres
          cargo test invariant --all-targets -- --skip _pg --skip pg_ --skip postgres

  # Cross-OS Rust compile lanes: macOS + Windows. Gated on the narrower
  # rust_compile filter so docs-only, dashboard-only, JS-policy-only,
  # script-only, workflow-metadata-only, and Node-package-only PRs skip the
  # ~25 min macOS lane and the ~30 min Windows lane entirely. Nightly still
  # exercises the full matrix daily, so cross-OS Rust drift cannot land
  # silently.
  check_fast_cross_os:
    name: Fast check + non-PG tests (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust_compile == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      # Event-gate self-hosted runner sanity check (defence-in-depth).
      # The `runs-on` expression above already restricts self-hosted
      # selection to `push` and `workflow_dispatch`, but if a future
      # edit, a typo, or a misconfigured `vars.MACOS_RUNNER` allowed a
      # `pull_request` event (especially from a fork) to land on a
      # self-hosted runner, this step fails the job before any
      # untrusted code (checkout, dependency install, etc.) executes
      # on the operator's machine. Runs before `actions/checkout`.
      #
      # Fails closed: any pull_request* event executing on a
      # self-hosted runner aborts the job, regardless of whether the
      # head repo metadata is available.
      - name: Event-gate / self-hosted runner sanity check
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
          RUNNER_ENV: ${{ runner.environment }}
        run: |
          set -euo pipefail
          echo "runner.environment = ${RUNNER_ENV:-unknown}"
          echo "github.event_name  = ${EVENT_NAME}"
          echo "head repo          = ${HEAD_REPO:-<none>}"
          echo "base repo          = ${BASE_REPO}"
          case "${EVENT_NAME}" in
            pull_request|pull_request_target)
              if [ "${RUNNER_ENV:-}" = "self-hosted" ]; then
                echo "::error::pull_request event executing on a self-hosted runner. This is forbidden — pull_request workflow files are PR-controlled and cannot be trusted on self-hosted infrastructure. Check vars.MACOS_RUNNER routing and the runs-on expression in ci-pr.yml."
                exit 1
              fi
              echo "pull_request event on GitHub-hosted runner (${RUNNER_ENV:-unknown}). OK."
              ;;
            push|workflow_dispatch)
              echo "Trusted event (${EVENT_NAME}); self-hosted routing permitted."
              ;;
            *)
              if [ "${RUNNER_ENV:-}" = "self-hosted" ]; then
                echo "::error::Unexpected event '${EVENT_NAME}' executing on a self-hosted runner; failing closed."
                exit 1
              fi
              echo "Event '${EVENT_NAME}' on GitHub-hosted runner; OK."
              ;;
          esac

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Disable sccache on macOS
        if: runner.os == 'macOS'
        run: echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"

      - name: Install Opus on macOS
        if: runner.os == 'macOS'
        run: |
          brew install opus pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix opus)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      - name: Setup sccache
        if: runner.os != 'macOS'
        uses: mozilla-actions/sccache-action@v0.0.9

      # `target/` is intentionally NOT cached — sccache (GHA-backed) handles
      # compiled rustc output, and caching multi-GB `target/` directories
      # starves the 10GB GHA cache quota, evicting sccache shards (observed
      # Rust hit-rate collapse: 99.80% → 0.00% within hours of merges). See
      # docs/ci/sccache-setup.md §4.2.
      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo test (non-PG, targeted subset)
        shell: bash
        run: |
          set -euo pipefail
          cargo test --all-targets transition -- --skip _pg --skip pg_ --skip postgres --test-threads=1
          cargo test --all-targets auto_queue -- --skip _pg --skip pg_ --skip postgres
          cargo test --all-targets cancel -- --skip _pg --skip pg_ --skip postgres
          cargo test --all-targets review_decision -- --skip _pg --skip pg_ --skip postgres
          cargo test invariant --all-targets -- --skip _pg --skip pg_ --skip postgres

      - name: sccache stats
        if: always() && runner.os != 'macOS'
        shell: bash
        run: sccache --show-stats || true

  fast_check_required_context:
    name: Fast check (ubuntu-latest)
    needs: check_fast
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Mirror fast check result for branch protection
        run: |
          result="${{ needs.check_fast.result }}"
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            echo "check_fast result: $result (treated as pass)"
            exit 0
          fi
          echo "check_fast result: $result"
          exit 1

  fast_targeted_tests_required_context:
    name: Fast targeted tests (ubuntu-latest)
    needs: test_fast
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Mirror targeted test result for branch protection
        run: |
          result="${{ needs.test_fast.result }}"
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            echo "test_fast result: $result (treated as pass)"
            exit 0
          fi
          echo "test_fast result: $result"
          exit 1

  test_fast:
    name: PostgreSQL tests (ubuntu-postgres)
    needs: changes
    if: needs.changes.outputs.pg_db == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RUST_BACKTRACE: 1
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      POSTGRES_TEST_DATABASE_URL_BASE: postgresql://postgres:postgres@127.0.0.1:5432
      POSTGRES_TEST_ADMIN_DB: postgres
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      # See `check_fast` for rationale: `target/` excluded to protect sccache
      # GHA cache quota.
      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-fast-tests-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fast-tests-

      - name: cargo test (PG targeted subset)
        timeout-minutes: 15
        shell: bash
        run: |
          set -euo pipefail
          cargo test _pg -- --nocapture --test-threads=1
          cargo test pg_ -- --nocapture --test-threads=1
          cargo test postgres -- --nocapture --test-threads=1

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  high-risk-recovery:
    name: High-risk recovery
    needs: changes
    if: needs.changes.outputs.high_risk_recovery == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RUST_BACKTRACE: 1
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      POSTGRES_TEST_DATABASE_URL_BASE: postgresql://postgres:postgres@127.0.0.1:5432
      POSTGRES_TEST_ADMIN_DB: postgres
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      # See `check_fast` for rationale.
      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-recovery-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-recovery-

      - name: High-risk recovery lane
        run: "cargo test --bin agentdesk high_risk_recovery:: -- --test-threads=1"

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.rust_or_policy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: clippy, rustfmt

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      # See `check_fast` for rationale.
      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: cargo fmt -- --check
        run: cargo fmt -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -W clippy::all

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  scripts:
    name: Script checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run script checks
        run: ./scripts/ci-script-checks.sh

      - name: Upload maintainability audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maintainability-audit
          path: target/maintainability-audit.yaml
          if-no-files-found: ignore
          retention-days: 14
