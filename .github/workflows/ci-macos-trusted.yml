name: CI macOS Trusted

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

concurrency:
  group: ci-macos-trusted-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve_macos_runner:
    name: Resolve macOS runner
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.resolve.outputs.mode }}
      group: ${{ steps.resolve.outputs.group }}
      labels: ${{ steps.resolve.outputs.labels }}
    steps:
      - name: Validate self-hosted macOS routing
        id: resolve
        shell: bash
        env:
          MACOS_RUNNER: ${{ vars.MACOS_RUNNER }}
          MACOS_RUNNER_GROUP: ${{ vars.MACOS_RUNNER_GROUP }}
        run: |
          set -euo pipefail

          if [ -z "${MACOS_RUNNER:-}" ]; then
            {
              echo "mode=hosted"
              echo "group="
              echo 'labels=[]'
            } >> "$GITHUB_OUTPUT"
            echo "MACOS_RUNNER is unset; using GitHub-hosted macos-latest."
            exit 0
          fi

          if [ -z "${MACOS_RUNNER_GROUP:-}" ]; then
            echo "MACOS_RUNNER_GROUP is empty; using repo-level self-hosted runner (label-based routing, no runner group). Runner groups require an organization; personal-account repos register repo-level runners and select them purely by label."
          fi

          labels="$(
            python3 - <<'PY'
          import json
          import os
          import sys

          raw = os.environ.get("MACOS_RUNNER", "")
          try:
              labels = json.loads(raw)
          except json.JSONDecodeError as exc:
              print(f"::error::MACOS_RUNNER must be a JSON array of runner labels: {exc}", file=sys.stderr)
              sys.exit(1)

          if not isinstance(labels, list) or not labels or not all(isinstance(label, str) and label for label in labels):
              print("::error::MACOS_RUNNER must be a non-empty JSON array of non-empty strings.", file=sys.stderr)
              sys.exit(1)

          required = {"self-hosted", "macOS"}
          missing = sorted(required.difference(labels))
          if missing:
              print(f"::error::MACOS_RUNNER is missing required label(s): {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)

          if not any(label.startswith("agentdesk-") for label in labels):
              print("::error::MACOS_RUNNER must include an AgentDesk fleet or host label such as agentdesk-macos or agentdesk-mac-mini.", file=sys.stderr)
              sys.exit(1)

          print(json.dumps(labels, separators=(",", ":")))
          PY
          )"

          {
            echo "mode=self-hosted"
            echo "group=${MACOS_RUNNER_GROUP}"
            echo "labels=${labels}"
          } >> "$GITHUB_OUTPUT"
          echo "Validated self-hosted macOS labels for runner group '${MACOS_RUNNER_GROUP}'."

  macos_hosted:
    name: Trusted macOS check (hosted)
    needs: resolve_macos_runner
    if: needs.resolve_macos_runner.outputs.mode == 'hosted'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Disable sccache on hosted macOS
        shell: bash
        run: |
          {
            echo "RUSTC_WRAPPER="
            echo "SCCACHE_GHA_ENABLED="
          } >> "$GITHUB_ENV"

      - name: Install Opus on macOS
        shell: bash
        run: |
          brew install opus pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix opus)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-trusted-macos-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-trusted-macos-

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo test (non-PG, targeted subset)
        shell: bash
        run: |
          set -euo pipefail
          cargo test --all-targets transition -- --skip _pg --skip pg_ --skip postgres --test-threads=1
          cargo test --all-targets auto_queue -- --skip _pg --skip pg_ --skip postgres
          cargo test --all-targets cancel -- --skip _pg --skip pg_ --skip postgres
          cargo test --all-targets review_decision -- --skip _pg --skip pg_ --skip postgres
          cargo test --all-targets stall_recovery -- --skip _pg --skip pg_ --skip postgres
          env -u AGENTDESK_ROOT_DIR cargo test --lib relay_recovery -- --skip _pg --skip pg_ --skip postgres
          python3 scripts/ci-timeout.py 900 env -u AGENTDESK_ROOT_DIR cargo test --lib health -- --skip _pg --skip pg_ --skip postgres
          cargo test --all-targets routines -- --skip _pg --skip pg_ --skip postgres
          cargo test invariant --all-targets -- --skip _pg --skip pg_ --skip postgres

      - name: Fresh user portable smoke
        shell: bash
        run: bash scripts/ci-macos-fresh-user-smoke.sh

  macos_self_hosted:
    name: Trusted macOS check (self-hosted)
    needs: resolve_macos_runner
    if: needs.resolve_macos_runner.outputs.mode == 'self-hosted'
    # Repo-level self-hosted runners (personal-account repos) select purely by
    # label — runner groups are an organization-only feature. If this repo is
    # ever moved under an org, switch back to the `group:`+`labels:` form and
    # set MACOS_RUNNER_GROUP.
    runs-on: ${{ fromJSON(needs.resolve_macos_runner.outputs.labels) }}
    # Self-hosted runners do NOT inherit GitHub's auto-cancellation, so without
    # an explicit bound a hung cargo link/deadlocked test could hold the shared
    # production Mac mini up to the 6h hard max (see #3867, #3658). Cap the job
    # at 45 min — comfortably above observed cold-sccache build+test durations
    # while still freeing the host for the live control plane on a stall.
    timeout-minutes: 45
    # CPU headroom for the co-located operational Postgres (see #3658). This
    # self-hosted runner shares the Mac mini (M4 Pro, 12-14 cores) with the
    # production Postgres + a dcserver worker node, so an unbounded parallel
    # cargo build saturated every core and starved Postgres → cluster-wide pool
    # acquire timeouts. Cap cargo's parallel build units at 8 to leave >=4 cores
    # for Postgres + the control plane. This only bounds peak CPU; it cannot
    # break the build, only slow it slightly on a cold cache. The heavy cargo
    # steps below are additionally wrapped in `nice -n 10` so Postgres (default
    # nice 0, or raised per the #3658 host step) always preempts CI under
    # contention. Zero-cost mitigation (Option B); does not change any required
    # check or correctness gate.
    env:
      CARGO_BUILD_JOBS: "8"
    steps:
      - name: Trusted event / runner sanity check
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUNNER_ENV: ${{ runner.environment }}
          RUNNER_NAME: ${{ runner.name }}
        run: |
          set -euo pipefail
          echo "runner.name = ${RUNNER_NAME:-unknown}"
          echo "runner.environment = ${RUNNER_ENV:-unknown}"
          echo "github.event_name = ${EVENT_NAME}"
          case "${EVENT_NAME}" in
            push|workflow_dispatch|merge_group) ;;
            *)
              echo "::error::Unexpected event '${EVENT_NAME}' reached the self-hosted macOS workflow."
              exit 1
              ;;
          esac

          if [ "${RUNNER_ENV:-}" != "self-hosted" ]; then
            echo "::error::Expected a self-hosted runner, got '${RUNNER_ENV:-unknown}'. Check MACOS_RUNNER_GROUP and MACOS_RUNNER."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Configure local sccache
        shell: bash
        run: |
          set -euo pipefail
          if command -v sccache >/dev/null 2>&1; then
            sccache_dir="${SCCACHE_DIR:-$HOME/.cache/sccache}"
            {
              # Disable the GHA-backed cache and use the local SCCACHE_DIR.
              # sccache rejects an empty value, so this must be an explicit
              # `false` (not ``) — otherwise rustc-as-wrapper aborts with
              # "SCCACHE_GHA_ENABLED must be 'true'/'false'/...".
              echo "SCCACHE_GHA_ENABLED=false"
              echo "RUSTC_WRAPPER=$(command -v sccache)"
              echo "SCCACHE_DIR=${sccache_dir}"
              echo "SCCACHE_CACHE_SIZE=${SCCACHE_CACHE_SIZE:-20G}"
            } >> "$GITHUB_ENV"
            mkdir -p "$sccache_dir"
          else
            echo "::warning::sccache not found on self-hosted macOS runner; continuing without rustc wrapper."
            {
              echo "SCCACHE_GHA_ENABLED=false"
              echo "RUSTC_WRAPPER="
            } >> "$GITHUB_ENV"
          fi

      - name: Install Opus on macOS
        shell: bash
        run: |
          brew install opus pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix opus)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-trusted-macos-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-trusted-macos-

      # `nice -n 10` (lower scheduling priority) on the CPU-heavy cargo steps so
      # the co-located production Postgres preempts CI under contention (#3658,
      # Option B). `nice` only de-prioritizes; it cannot fail the build.
      - name: cargo check
        run: nice -n 10 cargo check --all-targets

      - name: cargo test (non-PG, targeted subset)
        shell: bash
        run: |
          set -euo pipefail
          nice -n 10 cargo test --all-targets transition -- --skip _pg --skip pg_ --skip postgres --test-threads=1
          nice -n 10 cargo test --all-targets auto_queue -- --skip _pg --skip pg_ --skip postgres
          nice -n 10 cargo test --all-targets cancel -- --skip _pg --skip pg_ --skip postgres
          nice -n 10 cargo test --all-targets review_decision -- --skip _pg --skip pg_ --skip postgres
          nice -n 10 cargo test --all-targets stall_recovery -- --skip _pg --skip pg_ --skip postgres
          nice -n 10 env -u AGENTDESK_ROOT_DIR cargo test --lib relay_recovery -- --skip _pg --skip pg_ --skip postgres
          nice -n 10 python3 scripts/ci-timeout.py 900 env -u AGENTDESK_ROOT_DIR cargo test --lib health -- --skip _pg --skip pg_ --skip postgres
          nice -n 10 cargo test --all-targets routines -- --skip _pg --skip pg_ --skip postgres
          nice -n 10 cargo test invariant --all-targets -- --skip _pg --skip pg_ --skip postgres

      - name: Fresh user portable smoke
        shell: bash
        run: nice -n 10 bash scripts/ci-macos-fresh-user-smoke.sh

      - name: sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats || true
