name: Regen inventory docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: regen-docs-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    name: Regen inventory docs (post-merge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate inventory docs
        run: python3 scripts/generate_inventory_docs.py

      - name: Detect drift
        id: drift
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- ARCHITECTURE.md docs/generated; then
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
            echo "Inventory docs are up to date."
          else
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open maintenance PR with regenerated docs
        if: steps.drift.outputs.has_drift == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${BASE_SHA:0:7}"
          branch="regen-docs/${short_sha}"

          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "Branch $branch already exists on remote; another regen run handled it."
            exit 0
          fi

          git checkout -b "$branch"
          git add ARCHITECTURE.md docs/generated
          git commit -m "chore: regenerate inventory docs after ${short_sha}"
          git push -u origin "$branch"

          pr_url=$(gh pr create \
            --base main \
            --head "$branch" \
            --title "chore: regenerate inventory docs after ${short_sha}" \
            --body "Automated maintenance PR. Inventory drift detected after [\`${short_sha}\`](${SERVER_URL}/${REPOSITORY}/commit/${BASE_SHA}). Auto-merges once required checks pass.")

          echo "Opened ${pr_url}"
          gh pr merge "${pr_url}" --auto --squash --delete-branch
          echo "Auto-merge enabled on ${pr_url}."
