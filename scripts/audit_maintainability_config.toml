# Configuration for scripts/audit_maintainability.py.
#
# Namespace caps apply to production Rust files under src/. Test-only Rust
# files remain excluded by the shared production_rust_files() filter.

[namespace_size_caps]
"src/services/discord/commands/inspect/**" = 700
"src/db/prompt_manifests/**" = 700
# 2026-07-06 #4091 admission: +3 for the crate-wide env-lock test-isolation sweep —
# race_loss.rs's `#[cfg(test)]` module gained `shared_test_env_lock()` acquisition +
# `#[allow(clippy::await_holding_lock)]` to serialize AGENTDESK_ROOT_DIR mutation.
# Test-harness lines only; production logic unchanged. More specific than the `**`
# glob below, so it must precede it for fnmatch first-match precedence.
"src/services/discord/router/message_handler/intake_turn/race_loss.rs" = 703
# #3837: child modules carved out of the intake_turn.rs giant via behavior-
# preserving decomposition (voice_intake / race_loss / turn_watchdog). Cap holds
# the new surface under the 700-line namespace ceiling.
"src/services/discord/router/message_handler/intake_turn/**" = 700
# #3811: status_panel.rs was already at 696/700 (effectively full). The turn-anchor
# feature needs the irreducible minimum on this surface — the `request_user_msg_id`
# snapshot field, its preserve/clear reset hooks, and the `render_status_panel`
# anchor-prepend param (the heavier setter/line-builder/store helpers live in the
# new turn_anchor.rs). More specific than the `**` glob below, so it must precede it
# for fnmatch first-match precedence.
"src/services/discord/placeholder_live_events/status_panel.rs" = 703
"src/services/discord/placeholder_live_events/status_events.rs" = 720 # 2026-07-04 #4097 admission: +21 for kind=background XML task-notification suppression (relay noise fix); cohesive documented helper, namespace effectively full (precedent: status_panel.rs).
"src/services/discord/placeholder_live_events/**" = 700
"src/services/discord/prompt_builder/**" = 700
"src/services/discord/runtime_bootstrap/**" = 700
"src/services/discord/tmux_watcher/**" = 700
"src/services/discord/turn_bridge/headless_delivery.rs" = 700
"src/services/discord/turn_bridge/status_panel.rs" = 700
"src/services/discord/turn_bridge/voice_completion.rs" = 700
