# Giant-file registry metadata (#3036).
#
# `scripts/generate_inventory_docs.py` renders the authoritative giant-file
# registry into `docs/generated/giant-file-registry.md` from this file plus the
# measured production LoC of each module. A "giant file" is a production Rust
# module whose production LoC (excluding `#[cfg(test)] mod` blocks) is
# >= 1000.
#
# Enforcement (generation fails otherwise):
#   * Every current prod-giant must appear either in `grandfathered` below or as
#     an `[[entry]]` table. A new giant with neither is rejected — register it
#     with an owner, deadline, and decompose issue first.
#   * Each `[[entry]]` must carry owner, deadline (YYYY-MM-DD), and
#     decompose_issue. Deadline-less registration is forbidden.
#   * A `grandfathered` path or `[[entry]]` whose module is no longer a
#     prod-giant is a ghost registration and must be removed (decomposition
#     complete).
#   * `grandfathered` must be a SUBSET of `grandfathered_baseline_paths`; a path
#     not already in the frozen baseline cannot be grandfathered (no swap-ins).
#
# Migration intent: drain `grandfathered` over time by either decomposing the
# module (drops below threshold -> remove the path here) or promoting it to a
# full `[[entry]]` with owner + deadline + decompose_issue. New giant files are
# never grandfathered; they must land as `[[entry]]` in the same PR.

# Closed baseline (#3036). `grandfathered` may only ever be a SUBSET of
# `grandfathered_baseline_paths`: a path may be removed from
# `grandfathered` (decomposed or promoted to an [[entry]]), but a path
# that is not already in the baseline can never be grandfathered. This
# blocks smuggling a new prod-giant into `grandfathered` to skip the
# owner/deadline/decompose_issue requirement (swap-in is rejected, not
# just count growth). Only remove a path from the baseline once it has
# been fully retired from `grandfathered`.
