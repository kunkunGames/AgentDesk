# `turn_identity_for_panel.as_ref()` into the new single-flock offset-TOCTOU RMW
# helper so a late-frame fresh row B is rejected. The helper bodies live in
# inflight.rs; this is the minimal call-site cost.
# #3558 (codex review follow-up): 10088 -> 10098 (+10), reviewable admission —
