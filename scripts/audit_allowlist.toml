# Each entry is either a repo-relative POSIX path or a path:line finding.
# Keep this list narrow: additions to hard-gated checks must reference an
# open extraction or cleanup issue in a nearby comment so future reviewers
# can decide whether to retire them.
#
# Hard-gated checks use this file as the current-HEAD baseline only. New
# regressions should remove code, update change-surfaces.md when appropriate,
# or link an open extraction issue before adding another exclusion.

# Giant files: change-surfaces.md is the source of truth. This list should
# normally stay empty; add entries only for temporary parser gaps with an
# open extraction issue.
